[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_pgsql", "php82Extensions.pgsql", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Extensions.openssl", "composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[start]
cmd = "mkdir -p bootstrap/cache storage/framework/views storage/framework/sessions storage/framework/cache/data storage/logs && chmod -R 777 bootstrap/cache storage && php artisan config:clear && php artisan serve --host=0.0.0.0 --port=$PORT"
